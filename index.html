<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cornelius Aurelius — Nature Art</title>

<style>
:root{
  --bg:#060611;
  --ink:#02020a;
  --cream:#fff3cf;
  --acid:#dfff4f;
  --cyan:#20ffd0;
  --pink:#ff3f91;
  --violet:#8a4dff;
  --orange:#ff9c3d;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  min-height:100vh;
  background:#05050d;
  color:var(--cream);
  font-family:Arial, Helvetica, sans-serif;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-4;
  background:
    radial-gradient(circle at 12% 14%, rgba(255,63,145,.38), transparent 32%),
    radial-gradient(circle at 88% 18%, rgba(32,255,208,.28), transparent 30%),
    radial-gradient(circle at 55% 88%, rgba(223,255,79,.18), transparent 36%),
    linear-gradient(140deg, #090512 0%, #071927 42%, #120617 100%);
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-3;
  pointer-events:none;
  opacity:.22;
  background-image:
    linear-gradient(120deg, rgba(255,255,255,.12) 1px, transparent 1px),
    linear-gradient(60deg, rgba(255,255,255,.07) 1px, transparent 1px),
    radial-gradient(circle, rgba(223,255,79,.34) 0 1px, transparent 2px);
  background-size:80px 80px, 80px 80px, 120px 120px;
  mask-image:radial-gradient(circle at center, black, transparent 76%);
}

.liquid{
  position:fixed;
  inset:-18%;
  z-index:-2;
  pointer-events:none;
  filter:blur(26px) saturate(1.35);
  opacity:.75;
}

.liquid span{
  position:absolute;
  border-radius:50%;
  mix-blend-mode:screen;
  animation:swim 18s ease-in-out infinite alternate;
}

.liquid span:nth-child(1){
  width:380px;
  height:380px;
  left:2%;
  top:12%;
  background:rgba(255,63,145,.22);
}

.liquid span:nth-child(2){
  width:460px;
  height:460px;
  right:4%;
  top:22%;
  background:rgba(32,255,208,.17);
  animation-duration:22s;
}

.liquid span:nth-child(3){
  width:340px;
  height:340px;
  left:36%;
  bottom:4%;
  background:rgba(223,255,79,.15);
  animation-duration:20s;
}

@keyframes swim{
  from{transform:translate3d(0,0,0) scale(1);}
  to{transform:translate3d(80px,-70px,0) scale(1.16);}
}

.site{
  width:min(1500px, 94vw);
  margin:auto;
}

/* TOP MARK */
.mark{
  min-height:24vh;
  display:grid;
  place-items:center;
  padding:40px 0 10px;
}

.logo-orb{
  width:min(560px, 92vw);
  aspect-ratio:4/1.35;
  border-radius:999px;
  display:grid;
  place-items:center;
  position:relative;
  border:1px solid rgba(255,255,255,.18);
  background:
    radial-gradient(circle at 18% 45%, rgba(255,63,145,.24), transparent 36%),
    radial-gradient(circle at 82% 50%, rgba(32,255,208,.22), transparent 38%),
    rgba(255,255,255,.055);
  box-shadow:
    inset 0 0 40px rgba(255,255,255,.05),
    0 30px 100px rgba(0,0,0,.48);
  backdrop-filter:blur(18px);
  overflow:hidden;
}

.logo-orb::before{
  content:"";
  position:absolute;
  inset:17px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
}

.logo-orb::after{
  content:"";
  position:absolute;
  width:160%;
  height:80%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.24), transparent);
  transform:rotate(-12deg) translateX(-120%);
  animation:shine 6s ease-in-out infinite;
}

@keyframes shine{
  0%,55%{transform:rotate(-12deg) translateX(-120%);}
  100%{transform:rotate(-12deg) translateX(120%);}
}

.logo-orb h1{
  position:relative;
  z-index:2;
  font-size:clamp(3rem, 8vw, 7.4rem);
  letter-spacing:-.09em;
  line-height:.75;
  font-weight:1000;
  text-transform:uppercase;
}

.logo-orb small{
  position:absolute;
  bottom:18%;
  left:50%;
  transform:translateX(-50%);
  z-index:2;
  color:var(--acid);
  font-size:.76rem;
  letter-spacing:.58em;
  font-weight:900;
  white-space:nowrap;
}

/* GALLERY */
.gallery{
  padding:35px 0 80px;
  display:grid;
  grid-template-columns:repeat(16, 1fr);
  grid-auto-flow:dense;
  gap:20px;
}

.portal{
  appearance:none;
  border:0;
  cursor:pointer;
  min-height:330px;
  position:relative;
  isolation:isolate;
  overflow:hidden;
  background:transparent;
  transform:translateY(var(--lift, 0px)) rotate(var(--tilt, 0deg));
  transition:
    transform .45s cubic-bezier(.2,.9,.2,1),
    filter .45s ease;
}

.portal:hover{
  transform:translateY(calc(var(--lift, 0px) - 12px)) rotate(var(--tilt, 0deg)) scale(1.025);
  filter:saturate(1.2) contrast(1.04);
}

.frame{
  position:absolute;
  inset:0;
  border-radius:var(--shape);
  background:
    radial-gradient(circle at 28% 22%, var(--a), transparent 31%),
    radial-gradient(circle at 80% 24%, var(--b), transparent 34%),
    radial-gradient(circle at 52% 95%, var(--c), transparent 40%),
    linear-gradient(145deg, rgba(255,255,255,.12), rgba(255,255,255,.025));
  border:1px solid rgba(255,255,255,.16);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.06),
    inset 0 -60px 100px rgba(0,0,0,.22),
    0 28px 90px rgba(0,0,0,.48);
  backdrop-filter:blur(10px);
}

.frame::before{
  content:"";
  position:absolute;
  inset:14px;
  border-radius:calc(var(--shape-soft));
  border:1px solid rgba(255,255,255,.13);
  z-index:4;
  pointer-events:none;
}

.frame::after{
  content:"";
  position:absolute;
  inset:-40%;
  background:
    conic-gradient(from 120deg, transparent, rgba(255,255,255,.14), transparent, rgba(255,255,255,.08), transparent);
  animation:spin 12s linear infinite;
  opacity:.5;
  mix-blend-mode:overlay;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

.art{
  position:absolute;
  inset:28px;
  display:grid;
  place-items:center;
  z-index:5;
}

.art img{
  width:100%;
  height:100%;
  object-fit:contain;
  filter:
    drop-shadow(0 24px 24px rgba(0,0,0,.56))
    drop-shadow(0 0 24px rgba(32,255,208,.12));
  transition:transform .5s cubic-bezier(.2,.9,.2,1), filter .5s ease;
}

.portal:hover img{
  transform:scale(1.08) rotate(calc(var(--tilt, 0deg) * -1));
  filter:
    drop-shadow(0 36px 36px rgba(0,0,0,.65))
    drop-shadow(0 0 34px rgba(223,255,79,.24));
}

/* SIZES */
.portal:nth-child(1){grid-column:span 7; grid-row:span 2; min-height:660px;}
.portal:nth-child(2){grid-column:span 4; min-height:320px;}
.portal:nth-child(3){grid-column:span 5; min-height:360px;}
.portal:nth-child(4){grid-column:span 5; min-height:390px;}
.portal:nth-child(5){grid-column:span 4; min-height:360px;}
.portal:nth-child(6){grid-column:span 7; min-height:430px;}
.portal:nth-child(7){grid-column:span 5; min-height:500px;}
.portal:nth-child(8){grid-column:span 6; min-height:360px;}
.portal:nth-child(9){grid-column:span 5; min-height:500px;}
.portal:nth-child(10){grid-column:span 8; min-height:420px;}
.portal:nth-child(11){grid-column:span 4; min-height:340px;}
.portal:nth-child(12){grid-column:span 4; min-height:340px;}
.portal:nth-child(13){grid-column:span 5; min-height:420px;}
.portal:nth-child(14){grid-column:span 7; min-height:430px;}
.portal:nth-child(15){grid-column:span 4; min-height:360px;}
.portal:nth-child(16){grid-column:span 4; min-height:360px;}
.portal:nth-child(17){grid-column:span 8; min-height:460px;}
.portal:nth-child(18){grid-column:span 4; min-height:350px;}
.portal:nth-child(19){grid-column:span 4; min-height:350px;}
.portal:nth-child(20){grid-column:span 7; min-height:440px;}
.portal:nth-child(21){grid-column:span 5; min-height:400px;}
.portal:nth-child(22){grid-column:span 4; min-height:350px;}
.portal:nth-child(23){grid-column:span 12; min-height:520px; margin-left:8%;}

/* SHAPES + PALETTES */
.portal:nth-child(6n+1){
  --shape:52% 48% 43% 57% / 38% 56% 44% 62%;
  --shape-soft:48% 52% 45% 55% / 42% 54% 46% 58%;
  --a:rgba(255,63,145,.42);
  --b:rgba(32,255,208,.32);
  --c:rgba(223,255,79,.24);
  --tilt:-1.5deg;
}

.portal:nth-child(6n+2){
  --shape:42px 160px 42px 160px;
  --shape-soft:32px 130px 32px 130px;
  --a:rgba(138,77,255,.42);
  --b:rgba(255,156,61,.34);
  --c:rgba(32,255,208,.22);
  --lift:28px;
  --tilt:1.2deg;
}

.portal:nth-child(6n+3){
  --shape:180px 46px 180px 46px;
  --shape-soft:140px 36px 140px 36px;
  --a:rgba(223,255,79,.34);
  --b:rgba(255,63,145,.36);
  --c:rgba(138,77,255,.26);
  --tilt:-.8deg;
}

.portal:nth-child(6n+4){
  --shape:48% 52% 66% 34% / 48% 38% 62% 52%;
  --shape-soft:45% 55% 61% 39% / 50% 42% 58% 50%;
  --a:rgba(32,255,208,.38);
  --b:rgba(255,156,61,.28);
  --c:rgba(255,63,145,.26);
  --lift:42px;
  --tilt:1.8deg;
}

.portal:nth-child(6n+5){
  --shape:999px;
  --shape-soft:999px;
  --a:rgba(255,156,61,.38);
  --b:rgba(223,255,79,.26);
  --c:rgba(32,255,208,.24);
  --tilt:-1deg;
}

.portal:nth-child(6n+6){
  --shape:50px 50px 210px 50px;
  --shape-soft:38px 38px 170px 38px;
  --a:rgba(255,63,145,.3);
  --b:rgba(138,77,255,.36);
  --c:rgba(223,255,79,.22);
  --lift:10px;
  --tilt:.7deg;
}

.portal:nth-child(4n) .art{
  inset:18px;
}

.portal:nth-child(5n) .art{
  inset:38px;
}

.portal:nth-child(9n) .frame{
  border-radius:38px 220px 38px 220px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:none;
  place-items:center;
  background:rgba(2,2,10,.88);
  backdrop-filter:blur(20px);
  z-index:40;
  padding:18px;
}

.modal.active{
  display:grid;
}

.modal-shell{
  width:min(1020px, 96vw);
  height:min(820px, 90vh);
  position:relative;
  border-radius:56px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
  background:
    radial-gradient(circle at 20% 20%, rgba(255,63,145,.28), transparent 34%),
    radial-gradient(circle at 82% 22%, rgba(32,255,208,.25), transparent 34%),
    radial-gradient(circle at 50% 100%, rgba(223,255,79,.16), transparent 42%),
    rgba(255,255,255,.06);
  box-shadow:0 45px 140px rgba(0,0,0,.76);
  display:grid;
  place-items:center;
}

.modal-shell::before{
  content:"";
  position:absolute;
  inset:24px;
  border-radius:42px;
  border:1px solid rgba(255,255,255,.14);
  pointer-events:none;
}

.modal-shell img{
  max-width:88%;
  max-height:82%;
  object-fit:contain;
  filter:drop-shadow(0 38px 42px rgba(0,0,0,.64));
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  width:54px;
  height:54px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(0,0,0,.4);
  color:#fff;
  font-size:2rem;
  line-height:1;
  cursor:pointer;
  z-index:4;
}

/* FOOTER */
footer{
  padding:26px 0 48px;
  text-align:center;
}

footer a{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:48px;
  padding:14px 22px;
  color:var(--cream);
  text-decoration:none;
  font-size:.76rem;
  font-weight:1000;
  letter-spacing:.34em;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.18);
  background:
    linear-gradient(90deg, rgba(255,63,145,.16), rgba(32,255,208,.12)),
    rgba(255,255,255,.055);
  box-shadow:0 18px 60px rgba(0,0,0,.42);
}

/* TABLET */
@media(max-width:1050px){
  .gallery{
    grid-template-columns:repeat(8, 1fr);
  }

  .portal,
  .portal:nth-child(1),
  .portal:nth-child(2),
  .portal:nth-child(3),
  .portal:nth-child(4),
  .portal:nth-child(5),
  .portal:nth-child(6),
  .portal:nth-child(7),
  .portal:nth-child(8),
  .portal:nth-child(9),
  .portal:nth-child(10),
  .portal:nth-child(11),
  .portal:nth-child(12),
  .portal:nth-child(13),
  .portal:nth-child(14),
  .portal:nth-child(15),
  .portal:nth-child(16),
  .portal:nth-child(17),
  .portal:nth-child(18),
  .portal:nth-child(19),
  .portal:nth-child(20),
  .portal:nth-child(21),
  .portal:nth-child(22),
  .portal:nth-child(23){
    grid-column:span 4;
    min-height:390px;
    margin-left:0;
  }
}

/* MOBILE */
@media(max-width:650px){
  .site{
    width:min(100% - 18px, 1500px);
  }

  .mark{
    min-height:18vh;
    padding-top:26px;
  }

  .logo-orb{
    aspect-ratio:2.2/1;
  }

  .logo-orb h1{
    font-size:clamp(2.7rem, 15vw, 4.8rem);
  }

  .logo-orb small{
    font-size:.56rem;
    letter-spacing:.34em;
    bottom:16%;
  }

  .gallery{
    grid-template-columns:1fr;
    gap:16px;
    padding-top:18px;
  }

  .portal,
  .portal:nth-child(1),
  .portal:nth-child(2),
  .portal:nth-child(3),
  .portal:nth-child(4),
  .portal:nth-child(5),
  .portal:nth-child(6),
  .portal:nth-child(7),
  .portal:nth-child(8),
  .portal:nth-child(9),
  .portal:nth-child(10),
  .portal:nth-child(11),
  .portal:nth-child(12),
  .portal:nth-child(13),
  .portal:nth-child(14),
  .portal:nth-child(15),
  .portal:nth-child(16),
  .portal:nth-child(17),
  .portal:nth-child(18),
  .portal:nth-child(19),
  .portal:nth-child(20),
  .portal:nth-child(21),
  .portal:nth-child(22),
  .portal:nth-child(23){
    grid-column:1;
    min-height:335px;
    transform:none;
  }

  .portal:hover{
    transform:translateY(-6px) scale(1.01);
  }

  .portal:nth-child(odd) .frame{
    border-radius:36px 120px 36px 120px;
  }

  .portal:nth-child(even) .frame{
    border-radius:120px 36px 120px 36px;
  }

  .portal:nth-child(odd) .frame::before{
    border-radius:28px 94px 28px 94px;
  }

  .portal:nth-child(even) .frame::before{
    border-radius:94px 28px 94px 28px;
  }

  footer a{
    font-size:.62rem;
    letter-spacing:.18em;
  }
}
</style>
</head>

<body>

<div class="liquid">
  <span></span>
  <span></span>
  <span></span>
</div>

<main class="site">

  <section class="mark">
    <div class="logo-orb">
      <h1>Aurelius</h1>
      <small>Nature Art</small>
    </div>
  </section>

  <section class="gallery" id="gallery"></section>

</main>

<div class="modal" id="modal">
  <div class="modal-shell">
    <button class="close" id="close">×</button>
    <img id="modalImg" src="" alt="">
  </div>
</div>

<footer>
  <a href="https://corneliusaurelius.com" target="_blank" rel="noopener">CORNELIUSAURELIUS.COM</a>
</footer>

<script>
const files = [
  "1.png",
  "2.png",
  "3.png",
  "4.png",
  "5.png",
  "6.png",
  "7.png",
  "8.png",
  "9.png",
  "10.png",
  "11.png",
  "12.png",
  "13.png",
  "14.png",
  "15.png",
  "16.png",
  "17.png",
  "18.png",
  "19.png",
  "20.png",
  "21.png",
  "22.png",
  "23.png"
];

const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
const closeBtn = document.getElementById("close");

files.forEach((file, index) => {
  const item = document.createElement("button");
  item.className = "portal";
  item.setAttribute("aria-label", "Open artwork " + (index + 1));

  item.innerHTML = `
    <div class="frame"></div>
    <div class="art">
      <img src="${file}" alt="" loading="lazy">
    </div>
  `;

  item.addEventListener("click", () => {
    modal.classList.add("active");
    modalImg.src = file;
  });

  gallery.appendChild(item);
});

function closeModal(){
  modal.classList.remove("active");
  modalImg.src = "";
}

closeBtn.addEventListener("click", closeModal);

modal.addEventListener("click", (event) => {
  if(event.target === modal) closeModal();
});

document.addEventListener("keydown", (event) => {
  if(event.key === "Escape") closeModal();
});
</script>

</body>
</html>
