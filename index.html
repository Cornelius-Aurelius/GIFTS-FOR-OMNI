<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cornelius Aurelius — Product Showcase</title>

<style>
:root{
  --bg:#090706;
  --cream:#fff4e6;
  --gold:#d6a75c;
  --clay:#b46b45;
  --ink:#17100c;
  --soft:#f7e0c4;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at 12% 10%, rgba(214,167,92,.24), transparent 30%),
    radial-gradient(circle at 85% 5%, rgba(180,107,69,.23), transparent 32%),
    linear-gradient(140deg,#080504,#140c08 42%,#050403);
  color:var(--cream);
  font-family:Arial, Helvetica, sans-serif;
  overflow-x:hidden;
}

.hero{
  min-height:48vh;
  display:grid;
  place-items:center;
  text-align:center;
  padding:60px 18px 30px;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  inset:auto 0 0 0;
  height:120px;
  background:linear-gradient(to bottom,transparent,var(--bg));
  pointer-events:none;
}

.badge{
  display:inline-block;
  padding:10px 18px;
  border:1px solid rgba(255,244,230,.25);
  border-radius:999px;
  color:var(--gold);
  letter-spacing:.18em;
  font-size:.72rem;
  text-transform:uppercase;
  margin-bottom:22px;
  backdrop-filter:blur(10px);
}

h1{
  font-size:clamp(3rem,9vw,8rem);
  line-height:.9;
  letter-spacing:-.08em;
  text-transform:uppercase;
  max-width:1100px;
  margin:auto;
}

.hero p{
  max-width:620px;
  margin:25px auto 0;
  color:rgba(255,244,230,.72);
  font-size:clamp(1rem,2vw,1.25rem);
}

.gallery-wrap{
  width:min(1500px,94%);
  margin:0 auto;
  padding:30px 0 90px;
}

.gallery{
  columns:4 260px;
  column-gap:18px;
}

.card{
  break-inside:avoid;
  margin:0 0 18px;
  border-radius:28px;
  overflow:hidden;
  background:rgba(255,244,230,.06);
  border:1px solid rgba(255,244,230,.12);
  box-shadow:0 24px 70px rgba(0,0,0,.45);
  position:relative;
  cursor:pointer;
  transform:translateY(0);
  transition:.35s ease;
}

.card:hover{
  transform:translateY(-8px) scale(1.01);
  border-color:rgba(214,167,92,.55);
  box-shadow:0 34px 90px rgba(0,0,0,.65);
}

.card img{
  display:block;
  width:100%;
  height:auto;
  filter:saturate(1.04) contrast(1.03);
}

.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(to top, rgba(0,0,0,.55), transparent 40%);
  opacity:.65;
  pointer-events:none;
}

.number{
  position:absolute;
  left:16px;
  bottom:14px;
  z-index:2;
  width:42px;
  height:42px;
  display:grid;
  place-items:center;
  border-radius:50%;
  background:rgba(9,7,6,.7);
  border:1px solid rgba(255,244,230,.25);
  color:var(--soft);
  font-size:.85rem;
  backdrop-filter:blur(10px);
}

.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  z-index:50;
  display:none;
  place-items:center;
  padding:20px;
}

.lightbox.active{
  display:grid;
}

.lightbox img{
  max-width:min(96vw,1200px);
  max-height:88vh;
  border-radius:28px;
  box-shadow:0 40px 120px rgba(0,0,0,.8);
}

.close{
  position:fixed;
  top:22px;
  right:24px;
  width:48px;
  height:48px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.08);
  color:white;
  font-size:1.8rem;
  cursor:pointer;
}

footer{
  text-align:center;
  padding:36px 18px;
  border-top:1px solid rgba(255,244,230,.12);
  color:var(--gold);
  letter-spacing:.22em;
  font-size:.78rem;
  text-transform:uppercase;
}

@media(max-width:700px){
  .hero{
    min-height:42vh;
    padding-top:45px;
  }

  .gallery-wrap{
    width:92%;
    padding-bottom:60px;
  }

  .gallery{
    columns:1;
  }

  .card{
    border-radius:22px;
  }

  h1{
    letter-spacing:-.06em;
  }
}
</style>
</head>

<body>

<section class="hero">
  <div>
    <div class="badge">Cornelius Aurelius</div>
    <h1>Product Showcase</h1>
    <p>Visual collection of product imagery, model shots and graphic design clothing concepts.</p>
  </div>
</section>

<main class="gallery-wrap">
  <section class="gallery" id="gallery"></section>
</main>

<div class="lightbox" id="lightbox">
  <button class="close" id="closeBtn">&times;</button>
  <img id="lightboxImg" src="" alt="Expanded product image">
</div>

<footer>
  corneliusaurelius.com
</footer>

<script>
const images = [
  "ChatGPT Image May 7, 2026, 05_20_22 AM.png",
  "ChatGPT Image May 7, 2026, 05_20_20 AM.png",
  "ChatGPT Image May 7, 2026, 05_20_15 AM.png",
  "ChatGPT Image May 7, 2026, 05_20_12 AM.png",
  "ChatGPT Image May 7, 2026, 05_20_09 AM.png",
  "ChatGPT Image May 7, 2026, 05_20_07 AM.png",
  "ChatGPT Image May 7, 2026, 05_20_05 AM.png",
  "ChatGPT Image May 7, 2026, 05_20_02 AM.png",
  "ChatGPT Image May 7, 2026, 05_19_59 AM.png",
  "ChatGPT Image May 7, 2026, 05_19_57 AM.png",
  "ChatGPT Image May 7, 2026, 05_19_54 AM.png",
  "ChatGPT Image May 7, 2026, 05_19_51 AM.png",
  "ChatGPT Image May 7, 2026, 05_19_48 AM.png",
  "ChatGPT Image May 7, 2026, 05_19_36 AM.png",
  "ChatGPT Image May 7, 2026, 05_19_33 AM.png",
  "ChatGPT Image May 7, 2026, 05_19_29 AM.png",
  "ChatGPT Image May 7, 2026, 05_19_25 AM.png"
];

const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightboxImg");
const closeBtn = document.getElementById("closeBtn");

images.forEach((src, index) => {
  const card = document.createElement("article");
  card.className = "card";

  const img = document.createElement("img");
  img.src = encodeURI(src);
  img.alt = `Cornelius Aurelius product image ${index + 1}`;
  img.loading = "lazy";

  const number = document.createElement("div");
  number.className = "number";
  number.textContent = String(index + 1).padStart(2, "0");

  card.appendChild(img);
  card.appendChild(number);

  card.addEventListener("click", () => {
    lightboxImg.src = encodeURI(src);
    lightbox.classList.add("active");
  });

  gallery.appendChild(card);
});

closeBtn.addEventListener("click", () => {
  lightbox.classList.remove("active");
  lightboxImg.src = "";
});

lightbox.addEventListener("click", e => {
  if(e.target === lightbox){
    lightbox.classList.remove("active");
    lightboxImg.src = "";
  }
});

document.addEventListener("keydown", e => {
  if(e.key === "Escape"){
    lightbox.classList.remove("active");
    lightboxImg.src = "";
  }
});
</script>

</body>
</html>
