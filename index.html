<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cornelius Aurelius — Nature Art Gallery</title>

<style>
:root{
  --night:#080616;
  --purple:#24103f;
  --aqua:#54f2d2;
  --lime:#d7ff6f;
  --rose:#ff5f9e;
  --orange:#ff9e57;
  --ink:#03020a;
  --cream:#fff7dc;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at 15% 10%, rgba(255,95,158,.35), transparent 32%),
    radial-gradient(circle at 85% 15%, rgba(84,242,210,.28), transparent 34%),
    radial-gradient(circle at 50% 90%, rgba(215,255,111,.22), transparent 38%),
    linear-gradient(135deg, #05030c 0%, #12051f 42%, #041d21 100%);
  color:var(--cream);
  font-family: Arial, Helvetica, sans-serif;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.22;
  background:
    linear-gradient(115deg, transparent 0 48%, rgba(255,255,255,.22) 49%, transparent 50%),
    linear-gradient(25deg, transparent 0 48%, rgba(255,255,255,.12) 49%, transparent 50%);
  background-size:90px 90px;
  mask-image:radial-gradient(circle at center, black, transparent 78%);
}

body::after{
  content:"";
  position:fixed;
  inset:-20%;
  pointer-events:none;
  background:
    radial-gradient(circle, rgba(215,255,111,.18) 0 2px, transparent 3px),
    radial-gradient(circle, rgba(84,242,210,.14) 0 1px, transparent 2px);
  background-size:130px 130px, 70px 70px;
  animation:floatDust 28s linear infinite;
}

@keyframes floatDust{
  from{transform:translate(0,0) rotate(0deg);}
  to{transform:translate(-80px,-120px) rotate(8deg);}
}

.page{
  width:min(1500px, 94vw);
  margin:auto;
  position:relative;
  z-index:2;
}

/* TOP */
.top{
  min-height:34vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:55px 0 25px;
}

.brand{
  position:relative;
  width:min(760px, 100%);
  aspect-ratio:2.7/1;
  display:grid;
  place-items:center;
}

.brand::before,
.brand::after{
  content:"";
  position:absolute;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.2);
}

.brand::before{
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 25% 40%, rgba(255,95,158,.24), transparent 28%),
    radial-gradient(circle at 74% 55%, rgba(84,242,210,.22), transparent 30%),
    rgba(255,255,255,.04);
  box-shadow:0 30px 100px rgba(0,0,0,.45);
  backdrop-filter:blur(18px);
}

.brand::after{
  width:86%;
  height:62%;
  animation:pulseRing 5s ease-in-out infinite;
}

@keyframes pulseRing{
  0%,100%{transform:scale(1); opacity:.45;}
  50%{transform:scale(1.06); opacity:.9;}
}

.brand h1{
  position:relative;
  font-size:clamp(2.2rem, 7vw, 7rem);
  line-height:.82;
  letter-spacing:-.08em;
  font-weight:950;
  text-transform:uppercase;
  text-shadow:0 20px 40px rgba(0,0,0,.5);
}

.brand h1 span{
  display:block;
  font-size:clamp(.75rem, 1.6vw, 1.05rem);
  letter-spacing:.55em;
  color:var(--lime);
  margin-top:18px;
}

/* GALLERY */
.gallery-wrap{
  padding:20px 0 90px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(12, 1fr);
  grid-auto-flow:dense;
  gap:20px;
}

.tile{
  min-height:320px;
  position:relative;
  isolation:isolate;
  overflow:hidden;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.055);
  box-shadow:0 24px 70px rgba(0,0,0,.42);
  transition:transform .35s ease, border-color .35s ease, filter .35s ease;
}

.tile:hover{
  transform:translateY(-9px) scale(1.015);
  border-color:rgba(215,255,111,.55);
  filter:saturate(1.16);
}

.tile::before{
  content:"";
  position:absolute;
  inset:-2px;
  z-index:-2;
  background:
    radial-gradient(circle at 25% 25%, rgba(255,95,158,.42), transparent 30%),
    radial-gradient(circle at 80% 30%, rgba(84,242,210,.36), transparent 34%),
    radial-gradient(circle at 50% 100%, rgba(255,158,87,.32), transparent 38%),
    linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.02));
}

.tile::after{
  content:"";
  position:absolute;
  inset:18px;
  border:1px solid rgba(255,255,255,.16);
  pointer-events:none;
  z-index:5;
  mix-blend-mode:screen;
}

.art{
  position:absolute;
  inset:24px;
  display:grid;
  place-items:center;
  z-index:3;
}

.art img{
  width:100%;
  height:100%;
  object-fit:contain;
  filter:
    drop-shadow(0 26px 25px rgba(0,0,0,.48))
    drop-shadow(0 0 26px rgba(215,255,111,.13));
  transition:transform .45s ease, filter .45s ease;
}

.tile:hover img{
  transform:scale(1.08) rotate(-1.2deg);
  filter:
    drop-shadow(0 34px 34px rgba(0,0,0,.55))
    drop-shadow(0 0 36px rgba(84,242,210,.24));
}

/* UNIQUE TILE SHAPES */
.tile:nth-child(1){
  grid-column:span 5;
  grid-row:span 2;
  min-height:640px;
  border-radius:56% 44% 42% 58% / 40% 50% 50% 60%;
}

.tile:nth-child(2){
  grid-column:span 3;
  border-radius:34px 120px 34px 120px;
}

.tile:nth-child(3){
  grid-column:span 4;
  border-radius:160px 34px 160px 34px;
}

.tile:nth-child(4){
  grid-column:span 4;
  border-radius:48% 52% 30% 70% / 61% 42% 58% 39%;
}

.tile:nth-child(5){
  grid-column:span 3;
  border-radius:50%;
}

.tile:nth-child(6){
  grid-column:span 5;
  min-height:390px;
  border-radius:38px 38px 170px 38px;
}

.tile:nth-child(7){
  grid-column:span 4;
  min-height:440px;
  border-radius:170px 42px 42px 170px;
}

.tile:nth-child(8){
  grid-column:span 4;
  border-radius:42px 170px 42px 170px;
}

.tile:nth-child(9){
  grid-column:span 4;
  min-height:440px;
  border-radius:55% 45% 60% 40% / 43% 64% 36% 57%;
}

.tile:nth-child(10){
  grid-column:span 6;
  min-height:380px;
  border-radius:44px 220px 44px 220px;
}

.tile:nth-child(11){
  grid-column:span 3;
  border-radius:48px;
}

.tile:nth-child(12){
  grid-column:span 3;
  border-radius:50%;
}

.tile:nth-child(13){
  grid-column:span 4;
  min-height:400px;
  border-radius:140px 40px 140px 40px;
}

.tile:nth-child(14){
  grid-column:span 5;
  border-radius:42% 58% 51% 49% / 53% 37% 63% 47%;
}

.tile:nth-child(15){
  grid-column:span 3;
  border-radius:42px 42px 150px 150px;
}

.tile:nth-child(16){
  grid-column:span 3;
  border-radius:150px 150px 42px 42px;
}

.tile:nth-child(17){
  grid-column:span 6;
  min-height:430px;
  border-radius:230px 44px 230px 44px;
}

.tile:nth-child(18){
  grid-column:span 3;
  border-radius:50%;
}

.tile:nth-child(19){
  grid-column:span 3;
  border-radius:44px 150px 44px 150px;
}

.tile:nth-child(20){
  grid-column:span 5;
  min-height:410px;
  border-radius:48% 52% 64% 36% / 39% 53% 47% 61%;
}

.tile:nth-child(21){
  grid-column:span 4;
  border-radius:150px 44px 44px 150px;
}

.tile:nth-child(22){
  grid-column:span 3;
  border-radius:44px;
}

.tile:nth-child(23){
  grid-column:span 12;
  min-height:500px;
  border-radius:280px 60px 280px 60px;
}

.tile:nth-child(odd)::before{
  background:
    radial-gradient(circle at 18% 20%, rgba(215,255,111,.34), transparent 30%),
    radial-gradient(circle at 80% 28%, rgba(255,95,158,.35), transparent 36%),
    radial-gradient(circle at 52% 100%, rgba(84,242,210,.26), transparent 40%),
    linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.025));
}

.tile:nth-child(3n)::before{
  background:
    radial-gradient(circle at 20% 80%, rgba(255,158,87,.38), transparent 30%),
    radial-gradient(circle at 78% 24%, rgba(84,242,210,.35), transparent 35%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.08), transparent 40%),
    linear-gradient(135deg, rgba(255,255,255,.1), rgba(255,255,255,.02));
}

.tile:nth-child(4n)::before{
  background:
    radial-gradient(circle at 30% 25%, rgba(150,93,255,.38), transparent 32%),
    radial-gradient(circle at 75% 75%, rgba(215,255,111,.3), transparent 36%),
    radial-gradient(circle at 50% 105%, rgba(255,95,158,.24), transparent 38%),
    linear-gradient(135deg, rgba(255,255,255,.1), rgba(255,255,255,.02));
}

.tile:nth-child(5n){
  transform:translateY(34px);
}

.tile:nth-child(5n):hover{
  transform:translateY(22px) scale(1.015);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:none;
  place-items:center;
  background:rgba(2,1,8,.86);
  backdrop-filter:blur(18px);
  z-index:30;
  padding:20px;
}

.modal.active{
  display:grid;
}

.modal-box{
  width:min(980px, 96vw);
  height:min(820px, 90vh);
  border-radius:52px;
  border:1px solid rgba(255,255,255,.18);
  background:
    radial-gradient(circle at 25% 20%, rgba(255,95,158,.24), transparent 35%),
    radial-gradient(circle at 80% 30%, rgba(84,242,210,.22), transparent 36%),
    radial-gradient(circle at 50% 100%, rgba(215,255,111,.16), transparent 42%),
    rgba(255,255,255,.055);
  box-shadow:0 40px 130px rgba(0,0,0,.7);
  display:grid;
  place-items:center;
  position:relative;
  overflow:hidden;
}

.modal-box::before{
  content:"";
  position:absolute;
  inset:28px;
  border-radius:38px;
  border:1px solid rgba(255,255,255,.14);
  pointer-events:none;
}

.modal-box img{
  max-width:88%;
  max-height:82%;
  object-fit:contain;
  filter:drop-shadow(0 36px 38px rgba(0,0,0,.58));
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  width:52px;
  height:52px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(0,0,0,.36);
  color:white;
  font-size:2rem;
  line-height:1;
  cursor:pointer;
  z-index:5;
}

/* FOOTER */
footer{
  position:relative;
  z-index:2;
  padding:34px 16px 46px;
  text-align:center;
}

footer a{
  color:var(--cream);
  text-decoration:none;
  font-size:.78rem;
  font-weight:900;
  letter-spacing:.35em;
  padding:15px 18px;
  border:1px solid rgba(255,255,255,.18);
  border-radius:999px;
  background:rgba(255,255,255,.06);
  box-shadow:0 18px 50px rgba(0,0,0,.32);
}

/* MOBILE */
@media(max-width:1050px){
  .gallery{
    grid-template-columns:repeat(8, 1fr);
  }

  .tile,
  .tile:nth-child(1),
  .tile:nth-child(2),
  .tile:nth-child(3),
  .tile:nth-child(4),
  .tile:nth-child(5),
  .tile:nth-child(6),
  .tile:nth-child(7),
  .tile:nth-child(8),
  .tile:nth-child(9),
  .tile:nth-child(10),
  .tile:nth-child(11),
  .tile:nth-child(12),
  .tile:nth-child(13),
  .tile:nth-child(14),
  .tile:nth-child(15),
  .tile:nth-child(16),
  .tile:nth-child(17),
  .tile:nth-child(18),
  .tile:nth-child(19),
  .tile:nth-child(20),
  .tile:nth-child(21),
  .tile:nth-child(22),
  .tile:nth-child(23){
    grid-column:span 4;
    min-height:360px;
  }

  .tile:nth-child(5n){
    transform:none;
  }

  .tile:nth-child(5n):hover{
    transform:translateY(-9px) scale(1.015);
  }
}

@media(max-width:640px){
  .page{
    width:min(100% - 18px, 1500px);
  }

  .top{
    min-height:26vh;
    padding:32px 0 16px;
  }

  .brand{
    aspect-ratio:1.85/1;
  }

  .brand h1{
    font-size:clamp(2.2rem, 14vw, 4.8rem);
  }

  .brand h1 span{
    font-size:.62rem;
    letter-spacing:.32em;
  }

  .gallery{
    grid-template-columns:1fr;
    gap:16px;
  }

  .tile,
  .tile:nth-child(1),
  .tile:nth-child(2),
  .tile:nth-child(3),
  .tile:nth-child(4),
  .tile:nth-child(5),
  .tile:nth-child(6),
  .tile:nth-child(7),
  .tile:nth-child(8),
  .tile:nth-child(9),
  .tile:nth-child(10),
  .tile:nth-child(11),
  .tile:nth-child(12),
  .tile:nth-child(13),
  .tile:nth-child(14),
  .tile:nth-child(15),
  .tile:nth-child(16),
  .tile:nth-child(17),
  .tile:nth-child(18),
  .tile:nth-child(19),
  .tile:nth-child(20),
  .tile:nth-child(21),
  .tile:nth-child(22),
  .tile:nth-child(23){
    grid-column:1;
    min-height:335px;
    border-radius:34px 95px 34px 95px;
  }

  .tile:nth-child(even){
    border-radius:95px 34px 95px 34px;
  }

  .art{
    inset:22px;
  }

  footer a{
    letter-spacing:.18em;
    font-size:.68rem;
  }
}
</style>
</head>

<body>

<main class="page">

  <section class="top">
    <div class="brand">
      <h1>
        Aurelius
        <span>Nature Art</span>
      </h1>
    </div>
  </section>

  <section class="gallery-wrap">
    <div class="gallery" id="gallery"></div>
  </section>

</main>

<div class="modal" id="modal">
  <div class="modal-box">
    <button class="close" id="closeModal">×</button>
    <img id="modalImg" src="" alt="">
  </div>
</div>

<footer>
  <a href="https://corneliusaurelius.com" target="_blank" rel="noopener">CORNELIUSAURELIUS.COM</a>
</footer>

<script>
const files = [
  "1.png",
  "2.png",
  "3.png",
  "4.png",
  "5.png",
  "6.png",
  "7.png",
  "8.png",
  "9.png",
  "10.png",
  "11.png",
  "12.png",
  "13.png",
  "14.png",
  "15.png",
  "16.png",
  "17.png",
  "18.png",
  "19.png",
  "20.png",
  "21.png",
  "22.png",
  "23.png"
];

const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
const closeModal = document.getElementById("closeModal");

files.forEach((file, index) => {
  const tile = document.createElement("button");
  tile.className = "tile";
  tile.setAttribute("aria-label", `Open image ${index + 1}`);
  tile.innerHTML = `
    <div class="art">
      <img src="${file}" alt="" loading="lazy">
    </div>
  `;

  tile.addEventListener("click", () => {
    modal.classList.add("active");
    modalImg.src = file;
  });

  gallery.appendChild(tile);
});

function closePreview(){
  modal.classList.remove("active");
  modalImg.src = "";
}

closeModal.addEventListener("click", closePreview);

modal.addEventListener("click", (e) => {
  if(e.target === modal) closePreview();
});

document.addEventListener("keydown", (e) => {
  if(e.key === "Escape") closePreview();
});
</script>

</body>
</html>
