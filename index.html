<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cornelius Aurelius — Product Showcase</title>

<style>
:root{
  --bg:#050505;
  --cream:#fff4e6;
  --gold:#d6a75c;
  --orange:#ff8c42;
  --red:#c94838;
  --smoke:rgba(255,255,255,.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at 10% 5%, rgba(255,140,66,.22), transparent 25%),
    radial-gradient(circle at 90% 0%, rgba(214,167,92,.18), transparent 28%),
    radial-gradient(circle at 50% 100%, rgba(201,72,56,.20), transparent 35%),
    #050505;
  color:var(--cream);
  font-family:Arial, Helvetica, sans-serif;
  overflow-x:hidden;
}

/* MOVING TRANSPARENT DESIGN BACKGROUND */
.design-orbit{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:0;
}

.float-design{
  position:absolute;
  width:clamp(90px, 12vw, 190px);
  opacity:.16;
  filter:drop-shadow(0 0 24px rgba(255,188,111,.22));
  animation:floatDesign linear infinite;
}

.float-design:nth-child(1){ left:3%; top:8%; animation-duration:28s; animation-delay:-3s; }
.float-design:nth-child(2){ left:16%; top:70%; animation-duration:34s; animation-delay:-9s; }
.float-design:nth-child(3){ left:31%; top:22%; animation-duration:30s; animation-delay:-16s; }
.float-design:nth-child(4){ left:45%; top:78%; animation-duration:38s; animation-delay:-5s; }
.float-design:nth-child(5){ left:59%; top:12%; animation-duration:32s; animation-delay:-12s; }
.float-design:nth-child(6){ left:72%; top:62%; animation-duration:35s; animation-delay:-18s; }
.float-design:nth-child(7){ left:86%; top:20%; animation-duration:29s; animation-delay:-7s; }
.float-design:nth-child(8){ left:8%; top:42%; animation-duration:37s; animation-delay:-22s; }
.float-design:nth-child(9){ left:24%; top:3%; animation-duration:31s; animation-delay:-11s; }
.float-design:nth-child(10){ left:38%; top:55%; animation-duration:36s; animation-delay:-14s; }
.float-design:nth-child(11){ left:53%; top:36%; animation-duration:33s; animation-delay:-20s; }
.float-design:nth-child(12){ left:68%; top:4%; animation-duration:39s; animation-delay:-8s; }
.float-design:nth-child(13){ left:82%; top:82%; animation-duration:34s; animation-delay:-24s; }
.float-design:nth-child(14){ left:12%; top:90%; animation-duration:40s; animation-delay:-13s; }
.float-design:nth-child(15){ left:90%; top:47%; animation-duration:30s; animation-delay:-17s; }

@keyframes floatDesign{
  0%{
    transform:translate3d(0, 80px, 0) rotate(0deg) scale(.85);
  }
  50%{
    transform:translate3d(45px, -80px, 0) rotate(180deg) scale(1.12);
  }
  100%{
    transform:translate3d(0, 80px, 0) rotate(360deg) scale(.85);
  }
}

/* PAGE */
.page{
  position:relative;
  z-index:2;
}

.hero{
  min-height:58vh;
  display:grid;
  place-items:center;
  text-align:center;
  padding:70px 18px 40px;
  position:relative;
}

.hero-inner{
  width:min(1100px,94%);
  padding:60px 22px;
  border:1px solid rgba(255,244,230,.12);
  border-radius:38px;
  background:
    linear-gradient(135deg, rgba(255,244,230,.10), rgba(255,244,230,.03)),
    rgba(0,0,0,.28);
  backdrop-filter:blur(14px);
  box-shadow:0 40px 120px rgba(0,0,0,.65);
}

.badge{
  display:inline-block;
  padding:11px 18px;
  border:1px solid rgba(214,167,92,.45);
  border-radius:999px;
  color:var(--gold);
  letter-spacing:.2em;
  font-size:.72rem;
  text-transform:uppercase;
  margin-bottom:24px;
  background:rgba(0,0,0,.35);
}

h1{
  font-size:clamp(3.1rem,9vw,8.5rem);
  line-height:.88;
  letter-spacing:-.08em;
  text-transform:uppercase;
}

.hero p{
  max-width:650px;
  margin:26px auto 0;
  color:rgba(255,244,230,.75);
  font-size:clamp(1rem,2vw,1.18rem);
}

/* FEATURE MOVING STRIP */
.design-strip{
  width:100%;
  overflow:hidden;
  padding:18px 0;
  border-block:1px solid rgba(255,244,230,.1);
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(10px);
}

.strip-track{
  display:flex;
  gap:28px;
  width:max-content;
  animation:marquee 42s linear infinite;
}

.strip-track img{
  width:90px;
  height:90px;
  object-fit:contain;
  padding:13px;
  border-radius:24px;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,244,230,.15), rgba(255,244,230,.03));
  border:1px solid rgba(255,244,230,.12);
  filter:drop-shadow(0 10px 26px rgba(0,0,0,.5));
}

@keyframes marquee{
  from{ transform:translateX(0); }
  to{ transform:translateX(-50%); }
}

/* PRODUCT GALLERY */
.gallery-wrap{
  width:min(1540px,94%);
  margin:0 auto;
  padding:80px 0 90px;
}

.section-title{
  display:flex;
  justify-content:space-between;
  align-items:end;
  gap:20px;
  margin-bottom:28px;
}

.section-title h2{
  font-size:clamp(2rem,5vw,4.8rem);
  letter-spacing:-.06em;
  text-transform:uppercase;
}

.section-title span{
  color:var(--gold);
  font-size:.85rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  white-space:nowrap;
}

.gallery{
  columns:4 260px;
  column-gap:20px;
}

.card{
  break-inside:avoid;
  margin:0 0 20px;
  border-radius:32px;
  overflow:hidden;
  background:
    linear-gradient(145deg, rgba(255,244,230,.10), rgba(255,244,230,.03));
  border:1px solid rgba(255,244,230,.14);
  box-shadow:0 24px 70px rgba(0,0,0,.55);
  position:relative;
  cursor:pointer;
  transform:translateY(0);
  transition:.35s ease;
}

.card:hover{
  transform:translateY(-9px) scale(1.01);
  border-color:rgba(214,167,92,.65);
  box-shadow:0 36px 100px rgba(0,0,0,.76);
}

.card img{
  display:block;
  width:100%;
  height:auto;
  filter:saturate(1.06) contrast(1.05);
}

.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.62), transparent 44%);
  opacity:.8;
  pointer-events:none;
}

.number{
  position:absolute;
  left:17px;
  bottom:16px;
  z-index:2;
  width:44px;
  height:44px;
  display:grid;
  place-items:center;
  border-radius:50%;
  background:rgba(5,5,5,.72);
  border:1px solid rgba(255,244,230,.28);
  color:var(--cream);
  font-size:.82rem;
  backdrop-filter:blur(10px);
}

/* TRANSPARENT DESIGN SHOWCASE */
.transparent-section{
  width:min(1540px,94%);
  margin:0 auto 90px;
  padding:44px;
  border-radius:42px;
  background:
    radial-gradient(circle at 20% 10%, rgba(214,167,92,.18), transparent 30%),
    radial-gradient(circle at 80% 90%, rgba(255,140,66,.16), transparent 30%),
    rgba(255,255,255,.045);
  border:1px solid rgba(255,244,230,.12);
  box-shadow:0 34px 100px rgba(0,0,0,.55);
}

.design-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:18px;
  margin-top:28px;
}

.design-tile{
  min-height:150px;
  display:grid;
  place-items:center;
  border-radius:28px;
  background:
    radial-gradient(circle at center, rgba(255,244,230,.12), rgba(255,244,230,.025) 58%),
    #080808;
  border:1px solid rgba(255,244,230,.10);
  overflow:hidden;
  transition:.35s ease;
}

.design-tile:hover{
  transform:translateY(-8px);
  border-color:rgba(214,167,92,.55);
  box-shadow:0 24px 60px rgba(0,0,0,.55);
}

.design-tile img{
  width:82%;
  max-height:120px;
  object-fit:contain;
  filter:drop-shadow(0 12px 22px rgba(0,0,0,.75));
  animation:softPulse 5s ease-in-out infinite;
}

@keyframes softPulse{
  0%,100%{ transform:scale(.96) rotate(-1deg); }
  50%{ transform:scale(1.05) rotate(1deg); }
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.93);
  z-index:50;
  display:none;
  place-items:center;
  padding:20px;
}

.lightbox.active{
  display:grid;
}

.lightbox img{
  max-width:min(96vw,1200px);
  max-height:88vh;
  border-radius:28px;
  box-shadow:0 40px 120px rgba(0,0,0,.85);
}

.close{
  position:fixed;
  top:22px;
  right:24px;
  width:50px;
  height:50px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.08);
  color:white;
  font-size:1.9rem;
  cursor:pointer;
  z-index:60;
}

footer{
  position:relative;
  z-index:2;
  text-align:center;
  padding:38px 18px;
  border-top:1px solid rgba(255,244,230,.12);
  background:rgba(0,0,0,.4);
  letter-spacing:.22em;
  font-size:.78rem;
  text-transform:uppercase;
}

footer a{
  color:var(--gold);
  text-decoration:none;
}

footer a:hover{
  text-decoration:underline;
}

@media(max-width:800px){
  .hero{
    min-height:50vh;
    padding-top:42px;
  }

  .hero-inner{
    border-radius:28px;
    padding:44px 18px;
  }

  h1{
    letter-spacing:-.055em;
  }

  .section-title{
    display:block;
  }

  .section-title span{
    display:inline-block;
    margin-top:10px;
  }

  .gallery{
    columns:1;
  }

  .transparent-section{
    padding:24px;
    border-radius:30px;
  }

  .design-grid{
    grid-template-columns:repeat(2,1fr);
  }

  .float-design{
    opacity:.11;
  }
}
</style>
</head>

<body>

<div class="design-orbit" id="designOrbit"></div>

<div class="page">

  <section class="hero">
    <div class="hero-inner">
      <div class="badge">Cornelius Aurelius</div>
      <h1>Product Showcase</h1>
      <p>Model photography, clothing concepts and transparent graphic designs presented in a dark visual gallery.</p>
    </div>
  </section>

  <section class="design-strip">
    <div class="strip-track" id="stripTrack"></div>
  </section>

  <main class="gallery-wrap">
    <div class="section-title">
      <h2>Product Images</h2>
      <span>Click to enlarge</span>
    </div>

    <section class="gallery" id="gallery"></section>
  </main>

  <section class="transparent-section">
    <div class="section-title">
      <h2>Transparent Designs</h2>
      <span>Graphic collection</span>
    </div>

    <div class="design-grid" id="designGrid"></div>
  </section>

</div>

<div class="lightbox" id="lightbox">
  <button class="close" id="closeBtn">&times;</button>
  <img id="lightboxImg" src="" alt="Expanded image">
</div>

<footer>
  <a href="https://corneliusaurelius.com" target="_blank" rel="noopener noreferrer">
    corneliusaurelius.com
  </a>
</footer>

<script>
const productImages = [
  "ChatGPT Image May 7, 2026, 05_20_20 AM.png",
  "ChatGPT Image May 7, 2026, 05_20_15 AM.png",
  "ChatGPT Image May 7, 2026, 05_20_12 AM.png",
  "ChatGPT Image May 7, 2026, 05_20_09 AM.png",
  "ChatGPT Image May 7, 2026, 05_20_07 AM.png",
  "ChatGPT Image May 7, 2026, 05_20_05 AM.png",
  "ChatGPT Image May 7, 2026, 05_20_02 AM.png",
  "ChatGPT Image May 7, 2026, 05_19_59 AM.png",
  "ChatGPT Image May 7, 2026, 05_19_57 AM.png",
  "ChatGPT Image May 7, 2026, 05_19_54 AM.png",
  "ChatGPT Image May 7, 2026, 05_19_51 AM.png",
  "ChatGPT Image May 7, 2026, 05_19_48 AM.png",
  "ChatGPT Image May 7, 2026, 05_19_36 AM.png",
  "ChatGPT Image May 7, 2026, 05_19_33 AM.png",
  "ChatGPT Image May 7, 2026, 05_19_29 AM.png",
  "ChatGPT Image May 7, 2026, 05_19_25 AM.png"
];

const transparentDesigns = [
  "1.png",
  "2.png",
  "3.png",
  "4.png",
  "5.png",
  "6.png",
  "7.png",
  "8.png",
  "9.png",
  "10.png",
  "11.png",
  "12.png",
  "13.png",
  "14.png",
  "15.png",
  "16.png",
  "17.png",
  "18.png",
  "19.png",
  "20.png",
  "21.png",
  "22.png",
  "23.png"
];

const gallery = document.getElementById("gallery");
const designGrid = document.getElementById("designGrid");
const stripTrack = document.getElementById("stripTrack");
const designOrbit = document.getElementById("designOrbit");

const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightboxImg");
const closeBtn = document.getElementById("closeBtn");

function openLightbox(src){
  lightboxImg.src = encodeURI(src);
  lightbox.classList.add("active");
}

productImages.forEach((src, index) => {
  const card = document.createElement("article");
  card.className = "card";

  const img = document.createElement("img");
  img.src = encodeURI(src);
  img.alt = `Cornelius Aurelius product image ${index + 1}`;
  img.loading = "lazy";

  const number = document.createElement("div");
  number.className = "number";
  number.textContent = String(index + 1).padStart(2, "0");

  card.appendChild(img);
  card.appendChild(number);
  card.addEventListener("click", () => openLightbox(src));
  gallery.appendChild(card);
});

transparentDesigns.forEach((src, index) => {
  const tile = document.createElement("div");
  tile.className = "design-tile";

  const img = document.createElement("img");
  img.src = encodeURI(src);
  img.alt = `Transparent design ${index + 1}`;
  img.loading = "lazy";

  tile.appendChild(img);
  tile.addEventListener("click", () => openLightbox(src));
  designGrid.appendChild(tile);
});

[...transparentDesigns, ...transparentDesigns].forEach(src => {
  const img = document.createElement("img");
  img.src = encodeURI(src);
  img.alt = "";
  stripTrack.appendChild(img);
});

transparentDesigns.slice(0,15).forEach(src => {
  const img = document.createElement("img");
  img.className = "float-design";
  img.src = encodeURI(src);
  img.alt = "";
  designOrbit.appendChild(img);
});

function closeLightbox(){
  lightbox.classList.remove("active");
  lightboxImg.src = "";
}

closeBtn.addEventListener("click", closeLightbox);

lightbox.addEventListener("click", e => {
  if(e.target === lightbox) closeLightbox();
});

document.addEventListener("keydown", e => {
  if(e.key === "Escape") closeLightbox();
});
</script>

</body>
</html>
